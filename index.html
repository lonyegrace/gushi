<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>古诗学习</title>
    <style>
        body { font-family: "PingFang SC", sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .poem { background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 20px 0; }
        button { background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>小学生古诗学习</h1>
    <div class="poem" id="poemContainer">
        <p id="title">静夜思</p>
        <p id="author">李白</p>
        <p id="content">床前明月光，疑是地上霜。举头望明月，低头思故乡。</p>
    </div>
    <button onclick="prevPoem()">上一首</button>
    <button onclick="nextPoem()">下一首</button>

    <script>
        const poems = [
            {title: "静夜思", author: "李白", content: "床前明月光，疑是地上霜。举头望明月，低头思故乡。"},
            {title: "登鹳雀楼", author: "王之涣", content: "白日依山尽，黄河入海流。欲穷千里目，更上一层楼。"}
        ];
        let currentIndex = 0;

        function showPoem() {
            const p = poems[currentIndex];
            document.getElementById("title").textContent = p.title;
            document.getElementById("author").textContent = p.author;
            document.getElementById("content").textContent = p.content;
        }
        function prevPoem() {
            currentIndex = (currentIndex - 1 + poems.length) % poems.length;
            showPoem();
        }
        function nextPoem() {
            currentIndex = (currentIndex + 1) % poems.length;
            showPoem();
        }
    </script>
</body>
</html>
